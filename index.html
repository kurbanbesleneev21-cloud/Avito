<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleFlow — Магазин одежды</title>
    <style>
        :root {
            --primary: #222;
            --accent: #ff4757;
            --light: #f4f4f4;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }

        header {
            background: var(--primary);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .cart-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        .hero {
            background: #e0e0e0;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            padding: 2rem 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            transition: transform 0.2s;
            text-align: center;
        }

        .product-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .product-img {
            width: 100%;
            height: 200px;
            background: #eee;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
        }

        .price { color: var(--accent); font-weight: bold; font-size: 1.2rem; margin: 10px 0; }

        .buy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            width: 100%;
            cursor: pointer;
            border-radius: 4px;
        }

        .buy-btn:hover { background: #444; }

        /* Простая модалка корзины */
        #cart-modal {
            display: none;
            position: fixed;
            right: 20px;
            top: 70px;
            background: white;
            border: 1px solid #ccc;
            padding: 20px;
            width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<header>
    <h1>StyleFlow</h1>
    <button class="cart-btn" onclick="toggleCart()">Корзина (<span id="cart-count">0</span>)</button>
</header>

<section class="hero">
    <h2>Новая коллекция 2026</h2>
    <p>Стиль, который говорит за вас</p>
</section>

<div class="container" id="products">
    </div>

<div id="cart-modal">
    <h3>Ваша корзина</h3>
    <div id="cart-items"></div>
    <hr style="margin: 10px 0;">
    <button class="buy-btn">Оформить заказ</button>
</div>

<script>
    const products = [
        { id: 1, name: "Базовая футболка", price: 1500 },
        { id: 2, name: "Худи Oversize", price: 3500 },
        { id: 3, name: "Джинсы Straight", price: 4200 },
        { id: 4, name: "Кепка Minimal", price: 1200 }
    ];

    let cartCount = 0;

    function renderProducts() {
        const container = document.getElementById('products');
        container.innerHTML = products.map(p => `
            <div class="product-card">
                <div class="product-img">Фото товара</div>
                <h3>${p.name}</h3>
                <p class="price">${p.price} ₽</p>
                <button class="buy-btn" onclick="addToCart()">Добавить</button>
            </div>
        `).join('');
    }

    function addToCart() {
        cartCount++;
        document.getElementById('cart-count').innerText = cartCount;
        alert("Товар добавлен в корзину!");
    }

    function toggleCart() {
        const modal = document.getElementById('cart-modal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
    }

    renderProducts();
</script>

</body>
</html>
